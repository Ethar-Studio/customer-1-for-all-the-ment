<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Services — All Men Salon</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Ccircle cx='16' cy='16' r='13' fill='%23D9A441'/%3E%3C/svg%3E">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Archivo:wght@500;600;700;800;900&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans+Arabic:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
  <script src="js/boot.js" defer></script>
</head>
<body data-page="services">

  <header class="site-header"></header>

  <main class="shell">
    <section class="page-head">
      <div class="section-label"><span class="dot"></span><span data-i18n="services.head.label">Service menu</span></div>
      <h1 class="display page-head__title rise-in" data-i18n="services.head.title">Cut to order.</h1>
      <p class="page-head__sub rise-in d1" data-i18n="services.head.sub"></p>
    </section>

    <section class="rise-in d2">
      <div class="menu" id="services-list"></div>
    </section>

    <section class="section">
      <div class="cta-band">
        <span class="eyebrow" data-i18n="cta.label">No waiting room purgatory</span>
        <h2 class="display" data-i18n="cta.title">The chair is waiting.</h2>
        <a href="reserve.html" class="btn btn--brass"><span data-i18n="cta.btn">Reserve a chair</span><span class="arr arr--ext">↗</span></a>
      </div>
    </section>
  </main>

  <footer class="footer"></footer>

  <script>
    window.PageInit = function () { renderMenu(); };
    window.onLanguageChange = function () { if (Store._ready) renderMenu(); };

    function renderMenu() {
      document.getElementById('services-list').innerHTML = SERVICES.map((s) => `
        <a class="menu-row" href="reserve.html?service=${s.id}">
          <span class="menu-row__num">${s.num}</span>
          <span class="menu-row__name">${esc(tv(s.name))}</span>
          <span class="menu-row__desc">${esc(tv(s.desc))}</span>
          <span class="menu-row__dur">${s.min} ${esc(t('services.min'))}</span>
          <span class="menu-row__price">${fmtPrice(s.price)}</span>
        </a>`).join('');
    }
  </script>
</body>
</html>
