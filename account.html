<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>My Visits — All Men Salon</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Ccircle cx='16' cy='16' r='13' fill='%23D9A441'/%3E%3C/svg%3E">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Archivo:wght@500;600;700;800;900&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans+Arabic:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
  <script src="js/boot.js" defer></script>
</head>
<body data-page="account">

  <header class="site-header"></header>

  <main class="shell">
    <section class="page-head">
      <div class="section-label"><span class="dot"></span><span data-i18n="mine.head.label">My visits</span></div>
      <h1 class="display page-head__title rise-in" data-i18n="mine.head.title">Past &amp; upcoming.</h1>
      <p class="page-head__sub rise-in d1" data-i18n="mine.head.sub"></p>
      <div style="margin-block-start:24px" class="rise-in d2">
        <button type="button" class="btn btn--ghost btn--sm" id="btn-signout"><span data-i18n="auth.signout">Sign out</span></button>
      </div>
    </section>

    <section class="rise-in d2" style="padding-block-end:clamp(64px,9vw,140px);max-width:860px">
      <div id="loyalty-card"></div>
      <div class="res-list" id="mine-list"></div>
    </section>
  </main>

  <footer class="footer"></footer>

  <script>
    let cancelArm = null;   // ref currently showing "confirm cancel"

    window.PageInit = function () {
      /* customers only — no session, an admin session, or an UNVERIFIED email → sign in */
      if (!Store.currentUser || Store.currentUser.isAdmin) { window.location.replace('signin.html?next=account.html'); return; }
      if (!Store.currentUser.emailVerified) { window.location.replace('signin.html?next=account.html'); return; }
      document.getElementById('btn-signout').addEventListener('click', async () => {
        await Store.signOut();
        window.location.replace('index.html');
      });
      renderMine();
    };
    window.onLanguageChange = function () { if (Store._ready && Store.currentUser) renderMine(); };

    function renderLoyalty(items) {
      const done = items.filter((r) => isCompletedHaircut(r)).length;
      const st = loyaltyStatus(done);
      const remaining = st.goal - st.stamps;
      const dots = Array.from({ length: st.goal + 1 }, (_, k) => {
        const isFreeSlot = k === st.goal;                 // last slot = the free one
        const filled = k < st.stamps;
        return `<span class="stamp ${filled ? 'stamp--on' : ''} ${isFreeSlot ? 'stamp--free' : ''}">${isFreeSlot ? '★' : (filled ? '✓' : (k + 1))}</span>`;
      }).join('');
      document.getElementById('loyalty-card').innerHTML = `
        <div class="loyalty">
          <div class="loyalty__head">
            <div>
              <div class="section-label"><span class="dot"></span><span>${esc(t('loyalty.title'))}</span></div>
              <p class="loyalty__sub">${esc(t('loyalty.sub'))}</p>
            </div>
            <div class="loyalty__count"><b>${done}</b> ${esc(t('loyalty.done'))}</div>
          </div>
          <div class="stamps">${dots}</div>
          <div class="loyalty__msg ${st.freeEarned ? 'loyalty__msg--free' : ''}">
            ${st.freeEarned ? esc(t('loyalty.free')) : ('<b>' + remaining + '</b> ' + esc(t('loyalty.remaining')))}
          </div>
          <div class="loyalty__note">${esc(t('loyalty.note'))}</div>
        </div>`;
    }

    async function renderMine() {
      const list = document.getElementById('mine-list');
      const items = await Store.myReservations();
      renderLoyalty(items);

      if (!items.length) {
        list.innerHTML = `
          <div class="empty-state">
            <p style="margin-block-end:20px">${esc(t('mine.empty'))}</p>
            <a href="reserve.html" class="btn btn--light"><span>${esc(t('mine.empty.cta'))}</span><span class="arr arr--ext">↗</span></a>
          </div>`;
        return;
      }

      list.innerHTML = items.map((r) => {
        const services = (r.serviceIds || []).map((id) => serviceById(id) ? tv(serviceById(id).name) : id).join(' + ');
        const barber = barberById(r.barberId) ? tv(barberById(r.barberId).name) : r.barberId;
        const arming = cancelArm === r.ref;
        /* only upcoming (pending/confirmed) visits can be cancelled, and only
           until 2 hours before the slot — after that the page says to call
           the shop. A done haircut is history and keeps its loyalty stamp. */
        const [ry, rm, rd] = String(r.date || '').split('-').map(Number);
        const [rh, rmin] = String(r.time || '').split(':').map(Number);
        const startsAt = new Date(ry, (rm || 1) - 1, rd || 1, rh || 0, rmin || 0);
        const cancellable = (r.status === 'pending' || r.status === 'confirmed')
          && startsAt.getTime() - Date.now() > 2 * 60 * 60 * 1000;
        return `
          <div class="res-item">
            <div>
              <div class="res-item__id">${esc(r.ref)}</div>
              <div class="res-item__title">${esc(services)}</div>
              <div class="res-item__meta">${esc(barber)} — ${esc(fmtWhen(r.date, r.time))} — ${fmtPrice(r.total)}</div>
            </div>
            <div class="res-item__end">
              <span class="status status--${esc(r.status)}">${esc(t('status.' + r.status))}</span>
              ${cancellable ? (arming
                ? `<button type="button" class="btn btn--danger btn--sm" data-cancel2="${esc(r.ref)}"><span>${esc(t('mine.cancel.confirm'))}</span></button>
                   <button type="button" class="btn btn--ghost btn--sm" data-keep="1"><span>${esc(t('mine.keep'))}</span></button>`
                : `<button type="button" class="btn btn--ghost btn--sm" data-cancel1="${esc(r.ref)}"><span>${esc(t('mine.cancel'))}</span></button>`) : ''}
            </div>
          </div>`;
      }).join('');

      list.querySelectorAll('[data-cancel1]').forEach((el) =>
        el.addEventListener('click', () => { cancelArm = el.dataset.cancel1; renderMine(); }));
      list.querySelectorAll('[data-keep]').forEach((el) =>
        el.addEventListener('click', () => { cancelArm = null; renderMine(); }));
      list.querySelectorAll('[data-cancel2]').forEach((el) =>
        el.addEventListener('click', async () => {
          const item = items.find((r) => r.ref === el.dataset.cancel2);
          if (item) await Store.setStatus(item, 'cancelled');
          cancelArm = null;
          renderMine();
        }));
    }
  </script>
</body>
</html>
