<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Opening Hours — All Men Salon</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Ccircle cx='16' cy='16' r='13' fill='%23D9A441'/%3E%3C/svg%3E">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Archivo:wght@500;600;700;800;900&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans+Arabic:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js" defer></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js" defer></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js" defer></script>
  <script src="js/firebase-config.js" defer></script>
  <script src="js/data.js" defer></script>
  <script src="js/i18n.js" defer></script>
  <script src="js/store.js" defer></script>
  <script src="js/app.js" defer></script>
</head>
<body data-page="hours">

  <header class="site-header"></header>

  <main class="shell">
    <section class="page-head">
      <div class="section-label"><span class="dot"></span><span data-i18n="hours.head.label">Opening hours</span></div>
      <h1 class="display page-head__title rise-in" data-i18n="hours.head.title">When the lamps are on.</h1>
      <p class="page-head__sub rise-in d1" data-i18n="hours.head.sub"></p>
      <div style="margin-block-start:26px" class="rise-in d2">
        <span class="open-pill" id="open-pill"></span>
      </div>
    </section>

    <section class="split rise-in d2" style="padding-block-end:clamp(56px,8vw,110px)">
      <div class="hours-table" id="hours-table"></div>
      <div>
        <div class="card">
          <div class="card__head">
            <span class="eyebrow" data-i18n="card.next">Next available</span>
            <span class="live-tag"><span class="dot dot--live"></span><span data-i18n="card.live">Live</span></span>
          </div>
          <p style="color:var(--ink-dim);font-size:14.5px;line-height:1.7;margin-block-end:24px" data-i18n="hours.note">
            Friday opens after Jumu’ah prayer. Last chair is seated 30 minutes before close.
          </p>
          <a href="reserve.html" class="btn btn--brass"><span data-i18n="cta.btn">Reserve a chair</span><span class="arr arr--ext">↗</span></a>
        </div>
      </div>
    </section>
  </main>

  <footer class="footer"></footer>

  <script>
    window.PageInit = function () { renderHours(); };
    window.onLanguageChange = function () { if (Store._ready) renderHours(); };

    const fmtH = (h) => {
      const ampm = window.LANG === 'ar' ? (h < 12 ? 'ص' : 'م') : (h < 12 ? 'AM' : 'PM');
      const h12 = ((h + 11) % 12) + 1;
      return h12 + ':00 ' + ampm;
    };

    function renderHours() {
      const now = new Date();
      const today = now.getDay();

      /* Weekly table, starting from Sunday */
      document.getElementById('hours-table').innerHTML =
        [0, 1, 2, 3, 4, 5, 6].map((d) => {
          const h = HOURS[d];
          const isToday = d === today;
          const time = h
            ? `<span dir="ltr">${fmtH(h[0])} — ${fmtH(h[1])}</span>`
            : esc(t('hours.closedday'));
          return `
            <div class="hours-row ${isToday ? 'hours-row--today' : ''} ${h ? '' : 'hours-row--closed'}">
              <div class="hours-row__day">${esc(t('days.long')[d])}${isToday ? ` <span class="eyebrow" style="color:var(--brass)">· ${esc(t('hours.today'))}</span>` : ''}</div>
              <div class="hours-row__time">${time}</div>
            </div>`;
        }).join('');

      /* Open-now pill */
      const h = HOURS[today];
      const hourNow = now.getHours() + now.getMinutes() / 60;
      const open = h && hourNow >= h[0] && hourNow < h[1];
      document.getElementById('open-pill').innerHTML =
        `<span class="dot ${open ? 'dot--live' : ''}" style="${open ? '' : 'background:var(--danger)'}"></span>
         <span style="color:${open ? 'var(--ok)' : 'var(--danger)'}">${esc(t(open ? 'hours.open' : 'hours.closed'))}</span>`;
    }
  </script>
</body>
</html>
